# Alembic configuration. The database URL is resolved at runtime from
# finunderwrite settings (env FINUNDERWRITE_DATABASE_URL / DATABASE_URL), so the
# sqlalchemy.url below is only a placeholder and is overridden in migrations/env.py.

[alembic]
script_location = migrations
prepend_sys_path = . src
sqlalchemy.url = sqlite:///local.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
